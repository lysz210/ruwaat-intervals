intervals:
  base-url: https://intervals.icu
  client-id: ${INTERVALS_CLIENT_ID}

quarkus:
  index-dependency:
    bluepring:
      group-id: it.lysz210.akasha.capacnan
      artifact-id: blueprint
  devservices:
    enabled: false
  config:
    locations:
      - "${CAPACNAN_BLUEPRINT_URI:}"
  rest-client:
    intervals-v1:
      url: ${intervals.base-url}
  messaging:
    nats:
      connection:
        servers:
          - "nats://localhost:4222"

'%dev':
  quarkus:
    rest-client:
      intervals-v1:
        logging:
          scope: all
          body-limit: 10240
    log:
#      level: DEBUG
      category:
        "io.quarkus.rest.client.reactive":
          level: DEBUG